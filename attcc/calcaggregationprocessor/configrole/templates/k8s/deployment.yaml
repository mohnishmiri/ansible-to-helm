apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ANS_msname}}-nds-{{version_major_minor}}-{{ROUTEOFFER|lower}}
  namespace: {{ANS_NAMESPACE}}
  labels:
    app: {{ANS_app_name}}-nds
    version: "{{ANS_VERSION}}"
    routeoffer: {{ROUTEOFFER}}
spec:
  replicas: {{att_ms_replicas_nds}}
  strategy:
    type: {{k8s_deployment_strategy}}
    rollingUpdate:
      maxUnavailable: {{pod_maxUnavailable}}
      maxSurge: {{pod_maxSurge}}
  minReadySeconds: {{pod_minReadySeconds}}
  revisionHistoryLimit: {{pod_revisionHistoryLimit}}
  selector:
    matchLabels:
      app: {{ANS_app_name}}-nds
      routeoffer: {{ROUTEOFFER}}
  template:
    metadata:
      labels:
        app: {{ANS_app_name}}-nds
        version: "{{ANS_VERSION}}"
        routeoffer: {{ROUTEOFFER}}
      annotations:
        prometheus.io/scrape.ne: 'true'
        prometheus.io/port: '{{server_health_port}}'
        prometheus.io/path: /actuator/prometheus
        GRM_NS: {{ANS_grm_ns}}
        seedname: ajsc7_jersey
        seedversion: 7.15.0-RELEASE
    spec:
      serviceAccount: default
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{nodeAffinitykey}}
                    operator: In
                    values:
                      - {{nodeAffinityvalue}}      
      volumes:
        - name: {{ANS_msname}}-volume
          configMap:
            name: {{ANS_msname}}-{{version_major_minor}}-{{ROUTEOFFER|lower}}-configs
        - name: {{ANS_msname}}-secretvolume
          secret:
            secretName: {{ANS_msname}}-{{version_major_minor}}-{{ROUTEOFFER|lower}}-secrets
        - name: {{ANS_msname}}-aafvolume
          secret:
            secretName: aaf-cred
            optional: true
            items:
            - key: keyfile
              path: keyfile
        - name: attcc-volume
          csi:
            driver: file.csi.azure.com
            volumeAttributes:
              mountOptions: dir_mode=0777,file_mode=0777,cache=strict,actimeo=30
              secretName: azure-secret
              shareName: aksmerge
      containers:
      - name: {{ANS_msname}}-nds
        image: {{ANS_imagename}}
        imagePullPolicy: {{k8s_imagepullpolicy}}
        resources:
          requests:
            memory: {{att_ms_reources_requests_memory}}
            cpu: {{att_ms_reources_requests_cpu}}
          limits:
            memory: {{att_ms_reources_limits_memory}}
            cpu: {{att_ms_reources_limits_cpu}}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: AJSCARGS
          value: "{{AJSCARGS}}"
        - name: AJSC_CONFIGMAP_MOUNT_PATH
          value: "/opt/att/ajsc/etc"
        - name: ROUTEOFFER
          value: "{{ROUTEOFFER}}"
        - name: ENVCONTEXT
          value: "{{ENVCONTEXT}}"
        - name: BUNDLEVERSION
          value: "{{ANS_VERSION}}"
        - name: AFTENVIRONMENT
          value: "{{AFTENVIRONMENT}}"
        - name: AFTLONGITUDE
          value: "{{AFTLONGITUDE}}"
        - name: AFTLATITUDE
          value: "{{AFTLATITUDE}}"
        - name: STICKYSELECTORKEY
          value: "{{STICKYSELECTORKEY}}"
        - name: DiscoveryURL
          value: "{{DiscoveryURL}}"
        - name: VoltageFlag
          value: "{{VoltageFlag}}"
        - name: usePPService
          value: "{{usePPService}}"
        - name: DEBUG_LEVEL
          value: "{{DEBUG_LEVEL}}"
        - name: FrameworkTimingLevel
          value: "{{FrameworkTimingLevel}}"
        - name: NAMESPACE
          value: "{{ANS_NAMESPACE}}"
        - name: APP_NAME
          value: "{{ANS_msname}}"
        - name: AAF_PERM_TYPE
          value: "{{AAF_PERM_TYPE}}"
        - name: AAF_ID
          valueFrom:
            secretKeyRef:
              name: aaf-cred
              key: aaf_id
              optional: true
        - name: AAF_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aaf-cred
              key: aaf_password
              optional: true
        - name: APP_VERSION
          value: "{{ANS_VERSION}}"
        - name: APP_ENV
