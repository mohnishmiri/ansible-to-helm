name: CI - Ansible to Helm Converter

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ansible-to-helm
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: ansible-to-helm
        run: |
          python -m pytest tests/ -v --cov=src/converter --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ansible-to-helm/coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff black
      - name: Run ruff
        working-directory: ansible-to-helm
        run: ruff check src/ tests/
      - name: Run black check
        working-directory: ansible-to-helm
        run: black --check src/ tests/

  helm-lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Install dependencies
        working-directory: ansible-to-helm
        run: pip install -r requirements.txt
      - name: Generate sample chart
        working-directory: ansible-to-helm
        run: |
          python convert.py \
            --playbook-location ../playbook \
            --config-role-location ../configrole \
            --output-location ./helm-output \
            --service-name customer-ms \
            --service-type java-ajsc \
            --namespace customer
      - name: Helm lint
        run: helm lint ansible-to-helm/helm-output/customer-ms/
