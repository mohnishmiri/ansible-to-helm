namespace: com-att-attcc-prod
replicaCount: 2
resources:
  requests:
    memory: 2Gi
    cpu: 512m
  limits:
    memory: 4Gi
    cpu: 1024m
javaOpts: -Xms512m -Xmx2048m -XX:MetaspaceSize=512m -XX:+UseConcMarkSweepGC -XX:+CMSIncrementalMode
  -Dhttp.nonProxyHosts=*.windows.net -Dhttps.nonProxyHosts=*.windows.net -Djavax.xml.parsers.SAXParserFactory=org.apache.xerces.jaxp.SAXParserFactoryImpl
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
