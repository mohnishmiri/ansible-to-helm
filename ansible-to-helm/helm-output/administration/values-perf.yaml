namespace: com-att-attcc-new-perf
replicaCount: 2
resources:
  requests:
    memory: 2Gi
    cpu: 512m
  limits:
    memory: 4Gi
    cpu: 1024m
javaOpts: -Xms512m -Xmx2048m -XX:MetaspaceSize=512m -XX:+UseConcMarkSweepGC -XX:+CMSIncrementalMode
  -Dhttp.nonProxyHosts=*.windows.net -Dhttps.nonProxyHosts=*.windows.net -Djavax.xml.parsers.SAXParserFactory=org.apache.xerces.jaxp.SAXParserFactoryImpl
envOverrides:
- name: ROUTEOFFER
  value: D2A
- name: ENVCONTEXT
  value: TEST
- name: AFTENVIRONMENT
  value: AFTUAT
- name: AFTLATITUDE
  value: '35.4'
- name: AFTLONGITUDE
  value: '-81.5'
- name: CSI_CLUSTER
  value: D6A
- name: WMQ_ENVCONTEXT
  value: D
- name: GL_ENV
  value: DEVL,V_DEVL
- name: DEBUG_LEVEL
  value: INFO
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nodepool
          operator: In
          values:
          - ruleengine
