    \ /> <!-- DEBUG -->   \n\t\t    <logger name=\"Request\" level=\"OFF\" /> <!--\
    \ OFF -->\n\t\t    <logger name=\"Response\" level=\"OFF\" /> <!-- OFF -->\n\t\
    \t</then>\n\t</if>\t\t\n\t\t\n    <!-- Debug logger can be enabled and disabled\
