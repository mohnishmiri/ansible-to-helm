namespace: com-att-attcc-dev-merge
appLabel: administration
routeoffer: ''
replicaCount: 1
image:
  repository: acr.azurecr.io/com-att-attcc-dev-merge/administration
  tag: 1.0.0
  pullPolicy: IfNotPresent
imagePullSecrets:
- name: regcred
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  create: true
  annotations: {}
  name: ''
podAnnotations:
  prometheus.io/scrape: 'true'
  prometheus.io/port: '8080'
  prometheus.io/path: /actuator/prometheus
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
    - ALL
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
ingress:
  enabled: false
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
  hosts:
  - host: administration.example.com
    paths:
    - path: /
      pathType: Prefix
  tls: []
resources:
  requests:
    memory: 1Gi
    cpu: 512m
  limits:
    memory: 2Gi
    cpu: 1024m
livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
    scheme: HTTP
    httpHeaders:
    - name: X-Custom-Header
      value: Alive
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 30
readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
    scheme: HTTP
    httpHeaders:
    - name: X-Custom-Header
      value: Ready
  initialDelaySeconds: 110
  periodSeconds: 30
  timeoutSeconds: 30
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
pdb:
  enabled: false
  minAvailable: 1
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 50%
    maxSurge: 50%
minReadySeconds: 120
revisionHistoryLimit: 3
nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nodepool
          operator: In
          values:
          - default
env:
- name: JAVA_OPTS_OVERRIDE
  value: -Xms512m -Xmx2048m -XX:MetaspaceSize=256m -XX:+UseConcMarkSweepGC -XX:+CMSIncrementalMode
    -Dhttp.nonProxyHosts=*.windows.net -Dhttps.nonProxyHosts=*.windows.net -Djavax.xml.parsers.SAXParserFactory=org.apache.xerces.jaxp.SAXParserFactoryImpl
- name: JAVA_OPTS
  value: $(JAVA_OPTS_OVERRIDE)
- name: AJSC_CONFIGMAP_MOUNT_PATH
  value: /opt/att/ajsc/etc
- name: ROUTEOFFER
  value: ROUTEOFFER
- name: ENVCONTEXT
  value: ENVCONTEXT
- name: BUNDLEVERSION
  value: ANS_VERSION
- name: AFTENVIRONMENT
  value: AFTENVIRONMENT
- name: AFTLONGITUDE
  value: AFTLONGITUDE
- name: AFTLATITUDE
  value: AFTLATITUDE
- name: STICKYSELECTORKEY
  value: STICKYSELECTORKEY
- name: DiscoveryURL
  value: DiscoveryURL
- name: VoltageFlag
  value: VoltageFlag
- name: usePPService
  value: usePPService
- name: DEBUG_LEVEL
  value: DEBUG_LEVEL
- name: FrameworkTimingLevel
  value: FrameworkTimingLevel
- name: NAMESPACE
  value: ANS_NAMESPACE
- name: APP_NAME
  value: ANS_msname
- name: AAF_PERM_TYPE
  value: AAF_PERM_TYPE
- name: APP_VERSION
  value: ANS_VERSION
- name: APP_ENV
  value: ENVCONTEXT
- name: TAPM_ENV
  value: TAPM_ENV
- name: TAPM_ROLLUP_ID
  value: TAPM_APPNAME
- name: GLOWROOT_FLAG
  value: GLOWROOT_FLAG
- name: MS_IMAGE_NAME
  value: ANS_imagename
- name: K8S_SERVER
  value: k8_server
- name: GL_ENV
  value: GL_ENV
- name: MOTSAppAcronym
  value: mots_application_acronym
envFromSecrets:
- secretName: aaf-cred
  keys:
  - name: AAF_ID
    key: aaf_id
  - name: AAF_PASSWORD
    key: aaf_password
- secretName: connectionmanagement
  keys:
  - name: attcc_db_url
    key: attcc_db_url
  - name: attcc_db_username
    key: attcc_db_username
  - name: attcc_db_password
    key: attcc_db_password
  - name: attcc_reporting_url
    key: attcc_reporting_url
  - name: attcc_rpt_db_url
    key: attcc_rpt_db_url
  - name: attcc_rpt_db_username
    key: attcc_rpt_db_username
  - name: attcc_rpt_db_password
    key: attcc_rpt_db_password
  - name: CORS_LIST
    key: CORS_LIST
  - name: ATTCC_KEY
    key: ATTCC_KEY
  - name: jwt_secret_key
    key: jwt_secret_key
  - name: jwt_token_validity
    key: jwt_token_validity
volumes:
- name: volume
  type: configmap
  sourceName: config
- name: secretvolume
  type: secret
  sourceName: secret
- name: aafvolume
  type: secret
  sourceName: aaf-cred
  external: true
  optional: true
volumeMounts:
- name: volume
  mountPath: /opt/att/ajsc/etc
- name: secretvolume
  mountPath: /opt/att/ajsc/secret
- name: aafvolume
  mountPath: /opt/att/ajsc/aaf
configFiles:
  aft.properties: 'com.att.aft.discovery.client.environment={{com_att_aft_discovery_client_environment}}

    com.att.aft.discovery.client.latitude={{com_att_aft_discovery_client_latitude}}

    com.att.aft.discovery.client.longitude={{com_att_aft_discovery_client_longitude}}

    com.att.aft.keyStore={{com_att_aft_keyStore}}

    com.att.aft.keyStorePassword={{com_att_aft_keyStorePassword}}

    com.att.aft.trustStore={{com_att_aft_trustStore}}

    com.att.aft.trustStorePassword={{com_att_aft_trustStorePassword}}

    com.att.aft.alias={{com_att_aft_alias}}'
  application.properties: "info.build.artifact=@project.artifactId@\ninfo.build.name=@project.name@\n\
    info.build.description=@project.description@\ninfo.build.version=@project.version@\n\
    info.build.groupId=@project.groupId@\nlogging.level.root={{ logging_level_root\
    \ }}\n\neco.seed.name=ajsc7_jersey\neco.seed.version=7.14.0-RELEASE\neco.seed.created.datetime=Wed\
    \ May  5 22:15:24 UTC 2021\n\nserver.servlet.contextPath=/\nserver.servlet-path=/\n\
    spring.jersey.application-path=/administration/v1\nserver.routingPath=/\nmots.application.acronym={{mots_application_acronym}}\n\
    platform.identifier=AJSC7_JERSEY\nspring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration\n\
    \nlogging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr($\
    \ threadId: {PID:- }){magenta} %clr(---){faint} %clr([ hostname: %X{hostname}\
    \ serviceName: %X{serviceName} version: %X{version} transactionId: %X{transactionId}\
    \ requestTimeStamp: %X{requestTimestamp}  responseTimeStamp: %X{responseTimestamp}\
    \ duration: %X{duration}]){yellow} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan}\
    \ %clr(:){faint} %m%n%wex\n\n#The max number of active threads in this pool\n\
    server.tomcat.max-threads={{ server_tomcat_max_threads }}\n#The minimum number\
    \ of threads always kept alive\nserver.tomcat.min-Spare-Threads={{ server_tomcat_min_Spare_Threads\
    \ }}\n#The number of milliseconds before an idle thread shutsdown, unless the\
    \ number of active threads are less or equal to minSpareThreads\nserver.tomcat.max-idle-time={{\
    \ server_tomcat_max_idle_time }}\n\n#for changing the tomcat port...\n#server.port=8081\n\
    \n#Management server port for accessing actuator endpoints...\nmanagement.server.port={{server_health_port}}\n\
    \n# Expose endpoints to web...\nmanagement.endpoints.web.exposure.include=info,health,prometheus\n\
    \n# Turn off all endpoints by default and enable only info, health and Prometheus\
    \ only...\nmanagement.endpoints.enabled-by-default=false\nmanagement.endpoint.info.enabled=true\n\
    management.endpoint.health.enabled=true\nmanagement.endpoint.prometheus.enabled=true\n\
    \n#Servlet context parameters\nserver.context_parameters.p-name={{ server_context_parameters_p_name\
    \ }} #context parameter with p-name as key and value as value.\n\n#Service System\
    \ Properties. Please, place any Service related System Properties below.\n#masterEndPointOverrideMap.location=etc/MasterEndPointOverrideMap.xml\n\
    #adapterDME2UrlMap.location=etc/AdapterDME2UrlMap.xml\n#AdapterMap.location=etc/Adapter.map\n\
    #defaultDME2EnvContext=TEST\n#com.att.aft.dme2.jms.stickySelectorKey=\n\n#path\
    \ for application environment file \n#env.path=etc/env-application.properties\n\
    #aaf.roles.properties=etc-local/AAFUserRoles.properties \n#cadi.properties.location=etc-local/cadi.properties\n\
    \n# make this true for AAF authentication and place cadi.properties into etc folder\n\
    #aaf.enabled=false\n\n# set to true to enable version proxy\n#ivp.enabled=false\n\
    \n"
  cadi.properties: "basic_realm={{cadi_basic_realm}}\nbasic_warn={{cadi_basic_warn}}\n\
    \ \ncadi_loglevel={{cadi_loglevel}}\n\ncadi_keyfile={{cadi_keyfile_path}}\n\n\n\
    \ \ncadi_protocols={{cadi_protocols}}\n\naaf_env={{aaf_env_var}}\n\n#aaf_url=https://DME2RESOLVE/service=com.att.authz.AuthorizationService/version=2.0/envContext=TEST/routeOffer=BAU_SE\n\
    #AFT_LATITUDE={{AFTLATITUDE}}\n#AFT_LONGITUDE={{AFTLONGITUDE}}\n#AFT_ENVIRONMENT={{AFTENVIRONMENT}}\n\
    \naaf_url={{cadi_aaf_url}}\naaf_locate_url={{cadi_aaf_locate_url}}\naaf_lur={{cadi_aaf_lur}}\n\
    \ \n#Commenting these 2 lines until CADI fixes Authorization issue in 1.4.2 cadi\
    \ jars - CPFSDKJAVA-1830\n#aaf_oauth2_token_url={{cadi_aaf_oauth2_token_url}}\n\
    #aaf_oauth2_introspect_url={{cadi_aaf_oauth2_introspect_url}}\n\naaf_id={{ cadi_aaf_id\
    \ }}\naaf_password={{ cadi_aaf_password }}\n\naaf_timeout={{cadi_aaf_timeout}}\n\
    \ncadi_latitude={{AFT_LATITUDE}}\ncadi_longitude={{AFT_LONGITUDE}}"
  errorMessages.properties: "#Below is the sample format of error/exception response.\
    \ It should always have 3 tokens. \n#httpStatusCode should be valid http response\
    \ status code ranging from 400 - 599 \n\n#failureCode=errorCode|errorDescription|httpStatusCode\n\
    demoFailure=SVC9999|Sample error record for testing|400\n"
  logback.xml: "<configuration scan=\"true\" scanPeriod=\"3 seconds\">\n\t\n\t<!--\
    \ this will disable printing the logback startup messages -->\n\t<!-- you may\
    \ need to comment it out to troubleshoot logging issues -->\n\t<statusListener\
    \ class=\"ch.qos.logback.core.status.NopStatusListener\" />\n\n\t<!-- this listener\
    \ enables overriding of log levels in the logging-override.properties file -->\n\
    \t<contextListener class=\"com.att.api.framework.common.logging.override.ContextListener\"\
    \ />\n\n\t<!-- set this to true to send json-formatted log entries to the console-->\n\
    \t<property name=\"USE_1T_LOGGING\" value=\"{{logging_enable_1T}}\" />  <!-- true\
    \ -->\n\n\t<!-- setting this to true will format the log entries easier to read,\
    \ but make sure it is false when deployed -->\n\t<property name=\"USE_1T_PRETTY_PRINT\"\
    \ value=\"{{logging_enable_1T_prettyprint}}\" />  <!-- false -->\n\n\t<!-- set\
    \ this to true to send audit and performance tracking log entries in legacy format\
    \ to console when USE_DASHBOARD_LOGGING is set to false -->\n\t<property name=\"\
    USE_LEGACY_LOGGING\" value=\"{{logging_enable_legacy}}\" />  <!-- false -->\n\n\
    \t<!-- set this to true to send audit and performance tracking log entries in\
    \ legacy format to the csi dashboard -->\n\t<property name=\"USE_DASHBOARD_LOGGING\"\
    \ value=\"{{logging_enable_csidashboard}}\" />  <!-- false -->\n\t \n\t<!-- setting\
    \ this to true will hide the SPI data from logs, but make sure it is true when\
    \ deployed -->\n    <property name=\"USE_SECURITY_FILTER\" value=\"{{logging_enable_securityfilter}}\"\
    \ /> <!-- true -->\n\n\t\n\t<!-- iLib related configs -->\n\t<property name=\"\
    defaultPatterniLibLogging\" value=\"%m%n\" />\n\n\t<appender name=\"STDOUTiLibLogging\"\
    \ class=\"ch.qos.logback.core.ConsoleAppender\">\n\t       <encoder>\n\t     \
    \         <pattern>${defaultPatterniLibLogging}</pattern>\n\t       </encoder>\n\
    \t</appender>\n\n\t<!-- this is the new 1T appender that writes json-formatted\
    \ log entries -->\n\t<appender name=\"1T\" class=\"ch.qos.logback.core.ConsoleAppender\"\
    >\n\t\t<encoder class=\"com.att.api.framework.common.logging.encoder.LoggingRecordEncoder\"\
    >\n\t\t\t<prettyPrint>${USE_1T_PRETTY_PRINT}</prettyPrint>\n\t\t\t<useSecurityFilter>${USE_SECURITY_FILTER}</useSecurityFilter>\n\
    \t\t</encoder>\n\t</appender>\n\t<appender name=\"1T_ASYNC\" class=\"com.att.api.framework.common.logging.appender.AsyncLoggingAppender\"\
    >\n\t\t<appender-ref ref=\"1T\" />\n\t</appender>\n\t\n\t<!-- appender that writes\
    \ using the legacy format -->\n\t<appender name=\"STDOUT\" class=\"ch.qos.logback.core.ConsoleAppender\"\
    >\n\t   <layout class=\"com.att.api.framework.common.logback.layout.SecurityPatternLayout\"\
    >      \n         <Pattern>%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%thread]\
    \ %n%msg%n</Pattern>\n       </layout>\n\t\t<!-- <encoder>\n\t\t\t<pattern>%d{yyyy-MM-dd\
    \ HH:mm:ss} - %-5level %logger{36} [%thread] %n%msg%n</pattern>\n\t\t</encoder>\
    \ -->\n\t</appender>\n\n\t<appender name=\"ASYNC_STDOUT\" class=\"ch.qos.logback.classic.AsyncAppender\"\
    >\n\t\t<appender-ref ref=\"STDOUT\" />\n\t</appender>\n\n    <!-- Legacy logging\
    \ appenders and loggers. This will enable the appenders and loggers only if it\
    \ is turned ON - START-->      \n        <!-- configure special appenders and\
    \ loggers to log to the dashboard via wmq (but only if dashboard logging enabled)\
    \ -->  \n\t\t<if condition='property(\"USE_DASHBOARD_LOGGING\").equals(\"true\"\
    )'>\n            <then>\n                <appender name=\"asyncWMQAuditAppender\"\
    \n                    class=\"com.att.api.framework.common.logback.jmsappender.AsyncJmsAppender\"\
    >\n                    <param name=\"JndiConnPropFile\" value=\"WMQJMSAPPENDERLOGGING\"\
    \ />\n                    <param name=\"DestinationName\" value=\"{{asyncWMQAuditAppender_DestinationName}}\"\
    \ />\n                    <layout class=\"ch.qos.logback.classic.PatternLayout\"\
    >\n                        <Pattern>%m</Pattern>\n                    </layout>\n\
    \                </appender>\n\n                <appender name=\"asyncWMQPerfAppender\"\
    \n                    class=\"com.att.api.framework.common.logback.jmsappender.AsyncJmsAppender\"\
    >\n                    <param name=\"JndiConnPropFile\" value=\"WMQJMSAPPENDERLOGGING\"\
    \ />\n                    <param name=\"DestinationName\" value=\"{{asyncWMQPerfAppender_DestinationName}}\"\
    \ />\n                    <layout class=\"ch.qos.logback.classic.PatternLayout\"\
    >\n                        <Pattern>%m</Pattern>\n                    </layout>\n\
    \                </appender>\n\t\t\t\t\n\t\t\t\t<!-- Log Legacy audit and performance\
    \ logs to Console & wmq when both Legacy logging & dashboard logging is turned\
    \ on -->      \n\t\t\t\t<if condition='property(\"USE_LEGACY_LOGGING\").equals(\"\
    true\")'>\n\t\t\t\t\t<then>\n\t\t\t\t\t\t<appender name=\"async_audit_log\" class=\"\
    ch.qos.logback.classic.AsyncAppender\">\n\t\t\t\t\t\t\t<appender-ref ref=\"asyncWMQAuditAppender\"\
    \ />\t\t\t\t\t\n\t\t\t\t\t\t</appender>\t\t\t\t\t\t\t \n\n\t\t\t\t\t\t<!-- audit\
    \ logger must be set to INFO to actually write audit record -->\n\t\t\t\t\t\t\
    <logger name=\"audit\" level=\"INFO\" additivity=\"false\">\n\t\t\t\t\t\t\t<appender-ref\
    \ ref=\"async_audit_log\" />\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t<appender-ref ref=\"\
    ASYNC_STDOUT\" />\n\t\t\t\t\t\t</logger>\n\t\t\t \n\t\t\t\t\t\t<logger name=\"\
    audit.{{ANS_app_name}}\" level=\"INFO\" additivity=\"false\">\n\t\t\t\t\t\t\t\
    <appender-ref ref=\"async_audit_log\" />\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t<appender-ref\
    \ ref=\"ASYNC_STDOUT\" />\n\t\t\t\t\t\t</logger>\n\n\t\t\t\t\t\t<logger name=\"\
    audit_BPM_Timing\" level=\"INFO\" additivity=\"false\">\n\t\t\t\t\t\t\t<appender-ref\
    \ ref=\"async_audit_log\" />\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t<appender-ref ref=\"\
    ASYNC_STDOUT\" />\n\t\t\t\t\t\t</logger>\n\n\t\t\t\t\t\t<appender name=\"async_perf_log\"\
    \ class=\"ch.qos.logback.classic.AsyncAppender\">\n\t\t\t\t\t\t\t<appender-ref\
    \ ref=\"asyncWMQPerfAppender\" />\t\t\t\t\t\t\t\n\t\t\t\t\t\t</appender>\n\n\t\
    \t\t\t\t\t<logger name=\"performance.tracking\" level=\"DEBUG\" additivity=\"\
    false\">\n\t\t\t\t\t\t\t<appender-ref ref=\"async_perf_log\" />\t\t\t\t\t\t\t\n\
    \t\t\t\t\t\t\t<appender-ref ref=\"ASYNC_STDOUT\" />\n\t\t\t\t\t\t</logger>\t\t\
    \t\t\t\t\n\t\t\t\t\t</then>\t\t\t\t\t\n\t\t\t\t</if>\n\t\t\t\t\n\t\t\t\t<!-- Log\
    \ Legacy audit and performance logs to wmq when Legacy logging is turned off &\
    \ dashboard logging is turned on -->      \n\t\t\t\t<if condition='property(\"\
    USE_LEGACY_LOGGING\").equals(\"false\")'>\n\t\t\t\t\t<then>\n\t\t\t\t\t\t<appender\
    \ name=\"async_audit_log\" class=\"ch.qos.logback.classic.AsyncAppender\">\n\t\
    \t\t\t\t\t\t<appender-ref ref=\"asyncWMQAuditAppender\" />\n\t\t\t\t\t\t</appender>\n\
    \n\t\t\t\t\t\t<!-- audit logger must be set to INFO to actually write audit record\
    \ -->\n\t\t\t\t\t\t<logger name=\"audit\" level=\"INFO\" additivity=\"false\"\
    >\n\t\t\t\t\t\t\t<appender-ref ref=\"async_audit_log\" />\n\t\t\t\t\t\t</logger>\n\
    \n\t\t\t\t\t\t<logger name=\"audit.{{ANS_app_name}}\" level=\"INFO\" additivity=\"\
    false\">\n\t\t\t\t\t\t\t<appender-ref ref=\"async_audit_log\" />\n\t\t\t\t\t\t\
    </logger>\n\n\t\t\t\t\t\t<logger name=\"audit_BPM_Timing\" level=\"INFO\" additivity=\"\
    false\">\n\t\t\t\t\t\t\t<appender-ref ref=\"async_audit_log\" />\n\t\t\t\t\t\t\
    </logger>\n\n\t\t\t\t\t\t<appender name=\"async_perf_log\" class=\"ch.qos.logback.classic.AsyncAppender\"\
    >\n\t\t\t\t\t\t\t<appender-ref ref=\"asyncWMQPerfAppender\" />\n\t\t\t\t\t\t</appender>\n\
    \n\t\t\t\t\t\t<logger name=\"performance.tracking\" level=\"DEBUG\" additivity=\"\
    false\">\n\t\t\t\t\t\t\t<appender-ref ref=\"async_perf_log\" />\n\t\t\t\t\t\t\
    </logger>\t\t\t\t\t\t\n\t\t\t\t\t</then>\t\t\t\t\t\n\t\t\t\t</if>\n\t\t\t\t\t\t\
    \t\t\n            </then>\n        </if>\n\n\t\t\n\t\t<!-- When dashboard logging\
    \ is Off and logging will be based on Legacy Logging status -->\n\t\t<if condition='property(\"\
    USE_DASHBOARD_LOGGING\").equals(\"false\")'>\n\t\t\t<then>\t\t\n\t\t\t<!-- Log\
    \ Legacy audit and performance logs to Console when Legacy logging is turned on\
    \ & dashboard logging is turned off -->\t\t\n\t\t\t<if condition='property(\"\
    USE_LEGACY_LOGGING\").equals(\"true\")'>\n\t\t\t<then>\n\t\t\t\t\t\t\t\t\t\t\t\
    \t\n\t\t\t\t<!-- audit logger must be set to INFO to actually write audit record\
    \ -->\n\t\t\t\t<logger name=\"audit\" level=\"INFO\" additivity=\"false\">\n\t\
    \t\t\t\t<appender-ref ref=\"ASYNC_STDOUT\" />\n\t\t\t\t</logger>\n\t\n\t\t\t\t\
    <logger name=\"audit.{{ANS_app_name}}\" level=\"INFO\" additivity=\"false\">\n\
    \t\t\t\t\t<appender-ref ref=\"ASYNC_STDOUT\" />\n\t\t\t\t</logger>\n\t\t\n\t\t\
    \t\t<logger name=\"audit_BPM_Timing\" level=\"INFO\" additivity=\"false\">\n\t\
    \t\t\t\t<appender-ref ref=\"ASYNC_STDOUT\" />\n\t\t\t\t</logger>\n\t\t\n\t\t\t\
    \t<logger name=\"performance.tracking\" level=\"DEBUG\" additivity=\"false\">\n\
    \t\t\t\t\t<appender-ref ref=\"ASYNC_STDOUT\" />\n\t\t\t\t</logger>\n\t\t\t</then>\n\
    \t\t\t</if>\n\t\t \n\t\t\t<!-- Turn off Legacy audit and performance loggers when\
    \ Legacy logging is turned off & dashboard logging is turned off -->\n\t\t\t<if\
    \ condition='property(\"USE_LEGACY_LOGGING\").equals(\"false\")'>\n\t\t\t\t<then>\n\
    \t\t\t\t\t<!-- audit logger must be set to INFO to actually write audit record\
    \ -->\n\t\t\t\t\t<logger name=\"audit\" level=\"OFF\" />\n\t\t\t\t\t<logger name=\"\
    audit.{{ANS_app_name}}\" level=\"OFF\" />\n\t\t\t\t\t<logger name=\"audit_DirectCall\"\
    \ level=\"OFF\" />\n\t\t\t\t\t<logger name=\"audit_BPM_Timing\" level=\"OFF\"\
    \ />\n\t\t\t\t\t<logger name=\"performance.tracking\" level=\"OFF\" />\n\t\t\t\
